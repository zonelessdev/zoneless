<app-modal
  [isOpen]="isOpen"
  [title]="title"
  [loading]="loading"
  [submitLabel]="confirmLabel"
  [closeLabel]="cancelLabel"
  [destructive]="destructive"
  (closed)="cancelled.emit()"
  (submitted)="confirmed.emit()"
>
  @if (description) {
  <p class="dialog-description">{{ description }}</p>
  }
</app-modal>
