<div class="header-wrapper">
  <h1>Product Catalogue</h1>
  <button
    type="button"
    class="action-button action-button-dainty"
    (click)="OnCreateProductClick()"
  >
    <img class="button-icon" src="assets/icons/add.svg" alt="" />
    <span>Create Product</span>
  </button>
</div>
<div class="tab-bar">
  <button
    type="button"
    class="tab-button"
    [class.tab-active]="productsTab() === 'all'"
    (click)="SetProductsTab('all')"
  >
    All Products
  </button>
</div>

@if (productsTab() === 'all') {
<div class="field">
  <div class="field-pill">
    <div
      class="field-pill-option"
      role="button"
      tabindex="0"
      [class.field-pill-option-selected]="productsActiveTab() === 'all'"
      (click)="SetProductsActiveTab('all')"
      (keydown.enter)="SetProductsActiveTab('all')"
      (keydown.space)="SetProductsActiveTab('all')"
    >
      <span>All</span>
    </div>
    <div
      class="field-pill-option"
      role="button"
      tabindex="0"
      [class.field-pill-option-selected]="productsActiveTab() === 'active'"
      (click)="SetProductsActiveTab('active')"
      (keydown.enter)="SetProductsActiveTab('active')"
      (keydown.space)="SetProductsActiveTab('active')"
    >
      <span>Active</span>
    </div>
    <div
      class="field-pill-option"
      role="button"
      tabindex="0"
      [class.field-pill-option-selected]="productsActiveTab() === 'archived'"
      (click)="SetProductsActiveTab('archived')"
      (keydown.enter)="SetProductsActiveTab('archived')"
      (keydown.space)="SetProductsActiveTab('archived')"
    >
      <span>Archived</span>
    </div>
  </div>
</div>
<app-paginated-list
  #productsList
  endpoint="products"
  [columns]="productColumns"
  [limit]="10"
  [queryParams]="productsQueryParams()"
  (rowClick)="OnProductListClick($event)"
></app-paginated-list>
}

<!-- Create Product Slide Panel -->
<app-slide-panel
  [isOpen]="productPanelOpen()"
  [title]="
    productFormMode() === 'create' ? 'Add a product' : 'Update a product'
  "
  [loading]="productLoading()"
  submitLabel="Save"
  [submitDisabled]="false"
  (closed)="OnProductPanelClosed()"
  (submitted)="OnProductSubmit()"
>
  <app-product-form
    #productForm
    [mode]="productFormMode()"
    [product]="productToEdit()"
    [isOpen]="productPanelOpen()"
    [showErrors]="productShowErrors()"
    (validationChange)="OnProductValidationChange($event)"
  ></app-product-form>
</app-slide-panel>

<app-confirm-dialog
  [isOpen]="archiveDialogOpen()"
  title="Archive product"
  description="Archiving will hide this product from new purchases. Are you sure you want to archive this product?"
  confirmLabel="Archive product"
  [loading]="archiving()"
  (confirmed)="ConfirmArchive()"
  (cancelled)="archiveDialogOpen.set(false)"
></app-confirm-dialog>

<app-confirm-dialog
  [isOpen]="unarchiveDialogOpen()"
  title="Unarchive product"
  description="Unarchiving will make this product available for new purchases. Are you sure you want to unarchive this product?"
  confirmLabel="Unarchive product"
  [loading]="unarchiving()"
  (confirmed)="ConfirmUnarchive()"
  (cancelled)="unarchiveDialogOpen.set(false)"
></app-confirm-dialog>

<app-confirm-dialog
  [isOpen]="deleteDialogOpen()"
  title="Delete product"
  description="Deleting this product will permanently remove it from the product catalogue. Are you sure you want to delete this product?"
  confirmLabel="Delete product"
  [loading]="deleting()"
  [destructive]="true"
  (confirmed)="ConfirmDelete()"
  (cancelled)="deleteDialogOpen.set(false)"
></app-confirm-dialog>
