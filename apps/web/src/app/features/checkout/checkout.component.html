<div class="checkout-container">
  <div class="action-button" (click)="ConnectWallet()">Connect Wallet</div>
  <div class="action-button" (click)="GetAddress()">Get Address</div>
	<div class="input-container">
		<label>Amount (cents)</label>
		<input type="number" [(ngModel)]="amountInCents" />
		<label>Period Seconds</label>
		<input type="number" [(ngModel)]="periodSeconds" />
	</div>
	<div class="action-button" (click)="Subscribe()">Subscribe</div>
	<div class="action-button" (click)="GetSubscription()">Get Subscription</div>
	<div class="action-button" (click)="CancelSubscription()">Cancel Subscription</div>
	<div class="action-button" (click)="ChargeSubscription()">Charge Subscription</div>
	<div class="action-button" (click)="GetSubscriptionDebugInfo()">Get Subscription Debug Info</div>
</div>
