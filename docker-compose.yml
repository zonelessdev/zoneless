services:
  mongodb:
    image: mongo:7
    container_name: zoneless-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=zoneless
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }"]
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      zoneless-network:
        aliases:
          - mongo

  # MongoDB admin UI (local development only — not included in production deployments)
  mongo-express:
    image: mongo-express:latest
    container_name: zoneless-mongo-express
    restart: unless-stopped
    ports:
      - '8082:8081'
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/?directConnection=true
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_BASICAUTH_USERNAME:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_BASICAUTH_PASSWORD:-admin123}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - zoneless-network

  # Zoneless API
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: zoneless-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - '${API_PORT:-3333}:${API_PORT:-3333}'
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/zoneless?directConnection=true}
      - DASHBOARD_URL=${DASHBOARD_URL:-}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-80}
      - APP_SECRET=${APP_SECRET:-}
      - SINGLE_TENANT=${SINGLE_TENANT:-true}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-}
      - LIVEMODE=${LIVEMODE:-false}
      - API_PORT=${API_PORT:-3333}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - zoneless-network

  # Zoneless Dashboard (Angular + nginx)
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: zoneless-web
    restart: unless-stopped
    ports:
      - '${DASHBOARD_PORT:-80}:80'
    environment:
      - API_PORT=${API_PORT:-3333}
    depends_on:
      - api
    networks:
      - zoneless-network

volumes:
  mongodb_data:
    driver: local

networks:
  zoneless-network:
    driver: bridge
